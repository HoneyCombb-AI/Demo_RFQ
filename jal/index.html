<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RFQ Reports — LevMix Gear Components</title>
  <meta name="description" content="Unified RFQ analysis reports for LevMix gear components.">
  <link rel="icon" type="image/x-icon" href="/public/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/public/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/public/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/public/apple-touch-icon.png">
  <link rel="manifest" href="/public/manifest.json">
  <style>
:root {
  --bg: #f7f6f3;
  --panel: #ffffff;
  --line: #e2dfd9;
  --text: #191817;
  --muted: #77726a;
  --accent: #c74632;
  --green: #2f7a45;
  --amber: #9a6a19;
  --blue: #315f9d;
  --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  line-height: 1.35;
}
.topbar {
  height: 76px;
  border-bottom: 1px solid var(--line);
  background: var(--panel);
  display: flex;
  align-items: center;
  gap: 22px;
  padding: 0 28px;
}
.title { font-weight: 720; font-size: 20px; }
.subtitle { color: var(--muted); font-size: 12px; margin-top: 4px; }
.pillbar { display: flex; gap: 10px; flex-wrap: wrap; margin-left: auto; }
.pill {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 9px 13px;
  background: #fff;
  font-weight: 650;
  color: #37332e;
  white-space: nowrap;
}
.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 48px 28px;
}
.section-label {
  font: 700 12px var(--mono);
  text-transform: uppercase;
  letter-spacing: .09em;
  color: var(--muted);
  margin-bottom: 16px;
}
.cards { display: flex; flex-direction: column; gap: 14px; }
.card {
  display: block;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  padding: 22px 24px;
  text-decoration: none;
  color: inherit;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.card:hover {
  border-color: #ccc8c0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.card-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 4px;
}
.card-name {
  font-weight: 720;
  font-size: 17px;
}
.card-arrow {
  color: var(--muted);
  font-size: 14px;
  flex-shrink: 0;
  transition: transform 0.15s;
}
.card:hover .card-arrow { transform: translateX(3px); }
.card-file {
  font: 600 12px var(--mono);
  color: var(--muted);
  margin-bottom: 14px;
}
.card-stats {
  display: flex;
  gap: 18px;
}
.card-stat {
  font: 700 12px var(--mono);
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
}
.card-stat b {
  color: var(--text);
  margin-right: 5px;
}
@media (max-width: 600px) {
  .container { padding: 32px 16px; }
  .card-stats { flex-direction: column; gap: 6px; }
}
  </style>
</head>
<body>
  <header class="topbar">
    <a href="../" style="text-decoration:none;color:var(--muted);font:700 13px var(--mono);text-transform:uppercase;letter-spacing:.08em">&lt; Back</a>
    <div>
      <div class="title">Jal — RFQ Reports</div>
      <div class="subtitle">LevMix Gear Components</div>
    </div>
    <div class="pillbar">
      <div class="pill">2 Reports</div>
    </div>
  </header>

  <div class="container">
    <div class="section-label">Select a report</div>
    <div class="cards">

      <a href="./report-1/" class="card" id="report-stirnrad">
        <div class="card-top">
          <span class="card-name">C.14.373-00 — Stirnrad z39 links LevMix</span>
          <span class="card-arrow">→</span>
        </div>
        <div class="card-file">report-1/index.html</div>
        <div class="card-stats">
          <span class="card-stat"><b>8</b> features</span>
          <span class="card-stat"><b>15</b> setups</span>
        </div>
      </a>

      <a href="./report-2/" class="card" id="report-zahnwelle">
        <div class="card-top">
          <span class="card-name">C.14.374-00 — Zahnwelle z9 rechts LevMix</span>
          <span class="card-arrow">→</span>
        </div>
        <div class="card-file">report-2/index.html</div>
        <div class="card-stats">
          <span class="card-stat"><b>13</b> features</span>
          <span class="card-stat"><b>11</b> setups</span>
        </div>
      </a>

    </div>
  </div>
</body>
</html>
