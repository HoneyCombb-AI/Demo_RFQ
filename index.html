<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RFQ Reports — Access</title>
  <meta name="description" content="Enter your organization code to access RFQ analysis reports.">
  <style>
:root {
  --bg: #f7f6f3;
  --panel: #ffffff;
  --line: #e2dfd9;
  --text: #191817;
  --muted: #77726a;
  --accent: #c74632;
  --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  line-height: 1.35;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.topbar {
  height: 76px;
  border-bottom: 1px solid var(--line);
  background: var(--panel);
  display: flex;
  align-items: center;
  padding: 0 28px;
}
.topbar-title { font-weight: 720; font-size: 20px; }
.topbar-sub { color: var(--muted); font-size: 12px; margin-top: 4px; }
.main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}
.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 40px 36px;
  width: 100%;
  max-width: 380px;
  text-align: center;
}
.card-label {
  font: 700 12px var(--mono);
  text-transform: uppercase;
  letter-spacing: .09em;
  color: var(--muted);
  margin-bottom: 8px;
}
.card-title {
  font-weight: 720;
  font-size: 22px;
  margin-bottom: 6px;
}
.card-desc {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 28px;
  line-height: 1.5;
}
.code-input-wrap {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 24px;
}
.code-digit {
  width: 52px;
  height: 60px;
  border: 2px solid var(--line);
  border-radius: 8px;
  background: #fbfaf8;
  font: 700 24px var(--mono);
  color: var(--text);
  text-align: center;
  outline: none;
  transition: border-color 0.15s;
  -moz-appearance: textfield;
}
.code-digit::-webkit-outer-spin-button,
.code-digit::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.code-digit:focus {
  border-color: var(--text);
}
.code-digit.error {
  border-color: var(--accent);
  animation: shake 0.4s ease;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-4px); }
  40%, 80% { transform: translateX(4px); }
}
.submit-btn {
  width: 100%;
  height: 46px;
  border: none;
  border-radius: 6px;
  background: var(--text);
  color: #fff;
  font: 700 13px var(--mono);
  text-transform: uppercase;
  letter-spacing: .08em;
  cursor: pointer;
  transition: opacity 0.15s;
}
.submit-btn:hover { opacity: 0.85; }
.error-msg {
  color: var(--accent);
  font: 600 12px var(--mono);
  margin-top: 14px;
  min-height: 18px;
}
  </style>
</head>
<body>
  <header class="topbar">
    <div>
      <div class="topbar-title">RFQ Reports</div>
      <div class="topbar-sub">Manufacturing Analysis Portal</div>
    </div>
  </header>

  <div class="main">
    <div class="card">
      <div class="card-label">Access Portal</div>
      <div class="card-title">Enter Organization Code</div>
      <div class="card-desc">Enter your 4-digit code to view your reports.</div>

      <div class="code-input-wrap">
        <input class="code-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" autofocus>
        <input class="code-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
        <input class="code-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
        <input class="code-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
      </div>

      <button class="submit-btn" id="submit-btn">View Reports</button>
      <div class="error-msg" id="error-msg"></div>
    </div>
  </div>

  <script>
const codes = {
  "4521": "jal"
};
const digits = document.querySelectorAll('.code-digit');
const errorMsg = document.getElementById('error-msg');

// Auto-focus next input on entry
digits.forEach((input, i) => {
  input.addEventListener('input', (e) => {
    const v = e.target.value.replace(/[^0-9]/g, '');
    e.target.value = v;
    errorMsg.textContent = '';
    digits.forEach(d => d.classList.remove('error'));
    if (v && i < digits.length - 1) digits[i + 1].focus();
    // Auto-submit when all 4 filled
    if (v && i === digits.length - 1) trySubmit();
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && !e.target.value && i > 0) {
      digits[i - 1].focus();
      digits[i - 1].value = '';
    }
    if (e.key === 'Enter') trySubmit();
  });
  // Handle paste
  input.addEventListener('paste', (e) => {
    e.preventDefault();
    const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
    for (let j = 0; j < digits.length && j < paste.length; j++) {
      digits[j].value = paste[j];
    }
    if (paste.length >= digits.length) trySubmit();
    else if (paste.length > 0) digits[Math.min(paste.length, digits.length - 1)].focus();
  });
});

document.getElementById('submit-btn').addEventListener('click', trySubmit);

function trySubmit() {
  const code = Array.from(digits).map(d => d.value).join('');
  if (code.length < 4) {
    showError('Please enter all 4 digits');
    return;
  }
  const org = codes[code];
  if (org) {
    window.location.href = './' + org + '/';
  } else {
    showError('Invalid code');
  }
}

function showError(msg) {
  errorMsg.textContent = msg;
  digits.forEach(d => d.classList.add('error'));
}
  </script>
</body>
</html>
